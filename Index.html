<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Standard Calculator</title>
    <link rel="stylesheet" href="calc-style.css">
</head>
<body>

    <div class="calculator-wrapper">
        <input type="text" id="display" readonly placeholder="0">
        <div class="calculator-grid">
            <button class="btn-action clear" onclick="clearDisplay()">C</button>
            <button class="btn-action" onclick="appendValue('/')">&divide;</button>
            <button class="btn-action" onclick="appendValue('*')">&times;</button>
            <button class="btn-action" onclick="deleteLast()">&larr;</button>

            <button onclick="appendValue('7')">7</button>
            <button onclick="appendValue('8')">8</button>
            <button onclick="appendValue('9')">9</button>
            <button class="btn-action" onclick="appendValue('-')">-</button>

            <button onclick="appendValue('4')">4</button>
            <button onclick="appendValue('5')">5</button>
            <button onclick="appendValue('6')">6</button>
            <button class="btn-action" onclick="appendValue('+')">+</button>

            <button onclick="appendValue('1')">1</button>
            <button onclick="appendValue('2')">2</button>
            <button onclick="appendValue('3')">3</button>
            <button class="btn-equal" onclick="calculateResult()">=</button>

            <button class="zero" onclick="appendValue('0')">0</button>
            <button onclick="appendValue('.')">.</button>
        </div>
    </div>

    <script src="calc-script.js"></script>
</body>
</html>
